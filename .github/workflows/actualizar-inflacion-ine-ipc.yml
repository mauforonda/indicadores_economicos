name: Actualizar Inflacion INE IPC

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * 1-5"

permissions:
  contents: write

jobs:
  actualizar-ine-ipc:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Validar ventana de actualizacion
        run: |
          dia_mes="$(date -u +%d)"
          if [ "$dia_mes" -lt 1 ] || [ "$dia_mes" -gt 14 ]; then
            echo "Fuera de la ventana 1-14 del mes; no se actualiza."
            exit 0
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: inflacion/requirements.txt

      - name: Instalar dependencias
        run: python -m pip install --upgrade pip && pip install -r inflacion/requirements.txt

      - name: Actualizar indicadores IPC
        run: python inflacion/ine_ipc.py

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit y push de CSV
        run: |
          git add inflacion/datos/ine_ipc_general.csv inflacion/datos/ine_ipc_divisiones.csv
          if git diff --cached --quiet; then
            echo "Sin cambios en los CSV"
            exit 0
          fi
          git commit -m "Actualizar inflacion: INE IPC"
          git push
