name: Actualizar BCB Reservas

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * 1-5"

permissions:
  contents: write

jobs:
  actualizar-bcb-reservas:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: bcb/requirements.txt

      - name: Instalar dependencias
        run: python -m pip install --upgrade pip && pip install -r bcb/requirements.txt

      - name: Actualizar serie de reservas
        run: python bcb/actualizar_reservas.py

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit y push de CSV
        run: |
          git add \
            bcb/datos/reservas.csv \
            bcb/datos/reservas_reciente.csv \
            bcb/datos/reservas_historico.csv \
            bcb/datos/reservas_diccionario.csv
          if git diff --cached --quiet; then
            echo "Sin cambios en los CSV"
            exit 0
          fi
          git commit -m "Actualizar BCB: reservas"
          for intento in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort || true
            sleep $((intento * 5))
          done
          echo "No se pudo sincronizar y publicar tras varios intentos."
          exit 1
