name: Actualizar Tickers

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Actualizar Conflictos Bloqueos
      - Actualizar Tipo De Cambio Binance
      - Actualizar Tipo De Cambio Referencial BCB
    types:
      - completed

permissions:
  contents: write

jobs:
  actualizar-tickers:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Construir tickers
        run: python tickers/construir_tickers.py

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit y push de CSV
        run: |
          git add tickers/tickers.csv
          if git diff --cached --quiet; then
            echo "Sin cambios en tickers.csv"
            exit 0
          fi
          git commit -m "Actualizar tickers"
          for intento in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort || true
            sleep $((intento * 5))
          done
          echo "No se pudo sincronizar y publicar tras varios intentos."
          exit 1
