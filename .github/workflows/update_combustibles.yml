name: Update Combustibles

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-combustibles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: combustibles/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r combustibles/requirements.txt

      - name: Clone bo-combustible source
        run: git clone --depth 1 https://github.com/sociedatos/bo-combustible.git /tmp/bo-combustible

      - name: Rebuild indicadores
        env:
          BO_COMBUSTIBLE_DIR: /tmp/bo-combustible
        run: python combustibles/procesar_estaciones_criticas.py

      - name: Commit updated CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add combustibles/datos/*.csv
          if git diff --cached --quiet; then
            echo "No data changes to commit"
            exit 0
          fi
          git commit -m "Actualizar combustibles"
          git pull --rebase origin main
          git push
