name: Actualizar Inflacion Supermercados Diario

on:
  workflow_dispatch:
  schedule:
    - cron: "30 6 * * *"

permissions:
  contents: write

jobs:
  actualizar-super-diario:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: inflacion/requirements.txt

      - name: Instalar dependencias
        run: python -m pip install --upgrade pip && pip install -r inflacion/requirements.txt

      - name: Clone precios
        run: git clone --depth=1 https://github.com/mauforonda/precios/ /tmp/precios/

      - name: Actualizar indicadores diarios del INE
        run: python inflacion/super_diario.py

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit y push de CSV
        run: |
          git add inflacion/datos/super_diario.csv
          if git diff --cached --quiet; then
            echo "Sin cambios en los CSV"
            exit 0
          fi
          git commit -m "Actualizar inflacion: Supermercados diario"
          git push
